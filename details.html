<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Details - Aniverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' },
                        dark: { 800: '#1e1e2f', 900: '#13131f' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex flex-col">
    <div id="navbar"></div>

    <main class="flex-grow container mx-auto px-4 py-8 relative">
        <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-colors mb-6 font-medium">
            <i class="fa-solid fa-arrow-left"></i> Back to previous
        </a>

        <div id="loading" class="flex justify-center items-center py-32">
            <div class="loader"></div>
        </div>

        <div id="error-state" class="hidden text-center py-20 bg-slate-800 rounded-xl max-w-lg mx-auto border border-slate-700 mt-10 shadow-2xl">
            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Anime Not Found</h2>
            <p class="text-gray-400">The requested anime could not be loaded or does not exist.</p>
        </div>

        <div id="details-container" class="hidden">
            <!-- Top Section -->
            <div class="flex flex-col md:flex-row gap-8 mb-12">
                <!-- Left Sidebar -->
                <div class="w-full md:w-1/3 lg:w-1/4 shrink-0">
                    <img id="anime-poster" src="" alt="Poster" class="w-full rounded-2xl border border-slate-700 mb-6">
                    
                    <div class="space-y-4 hidden md:block">
                        <div class="bg-slate-800/80 p-5 rounded-2xl border border-slate-700 shadow-lg">
                            <h4 class="font-bold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-circle-info text-brand-400"></i> Information</h4>
                            <ul class="text-sm space-y-3 text-gray-300" id="anime-info-list">
                                <!-- Info gen here -->
                            </ul>
                        </div>
                    </div>
                </div>
                
                <!-- Main Content -->
                <div class="flex-grow">
                    <div class="flex items-center gap-2 mb-3 flex-wrap" id="anime-genres">
                        <!-- Genres -->
                    </div>
                    
                    <h1 id="anime-title" class="text-3xl md:text-5xl font-extrabold mb-1 tracking-tight text-white leading-tight"></h1>
                    <h2 id="anime-japanese-title" class="text-xl text-gray-400 mb-6 font-light"></h2>
                    
                    <div class="flex flex-wrap items-center gap-4 sm:gap-6 mb-8 bg-slate-800/80 p-4 rounded-2xl border border-slate-700 inline-flex shadow-lg">
                        <div class="text-center px-2">
                            <p class="text-[10px] sm:text-xs text-brand-400 uppercase tracking-widest font-bold mb-1">Score</p>
                            <p class="text-xl sm:text-2xl font-bold flex items-center justify-center gap-1.5"><i class="fa-solid fa-star text-yellow-400 text-lg"></i> <span id="anime-score"></span></p>
                        </div>
                        <div class="w-px h-10 bg-slate-700"></div>
                        <div class="text-center px-2">
                            <p class="text-[10px] sm:text-xs text-brand-400 uppercase tracking-widest font-bold mb-1">Rank</p>
                            <p class="text-xl sm:text-2xl font-bold text-white" id="anime-rank"></p>
                        </div>
                        <div class="w-px h-10 bg-slate-700"></div>
                        <div class="text-center px-2">
                            <p class="text-[10px] sm:text-xs text-brand-400 uppercase tracking-widest font-bold mb-1">Popularity</p>
                            <p class="text-xl sm:text-2xl font-bold text-white" id="anime-popularity"></p>
                        </div>
                    </div>

                    <!-- Synopsis -->
                    <div class="mb-10 bg-dark-800 p-6 rounded-2xl border border-slate-800 shadow-inner">
                        <h3 class="text-xl font-bold mb-3 flex items-center gap-2 text-white"><i class="fa-solid fa-book-open text-brand-400"></i> Synopsis</h3>
                        <p id="anime-synopsis" class="text-gray-300/90 leading-relaxed text-sm sm:text-base"></p>
                    </div>

                    <!-- Streaming Platforms -->
                    <div id="streaming-section" class="mb-10 hidden">
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-white border-b border-slate-800 pb-2">
                            <i class="fa-solid fa-play text-green-400"></i> Available to Watch
                        </h3>
                        <div id="streaming-list" class="flex flex-wrap gap-3">
                            <!-- Streaming links -->
                        </div>
                    </div>

                    <!-- Trailer Section -->
                    <div id="trailer-section" class="mb-10 hidden">
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-white border-b border-slate-800 pb-2">
                            <i class="fa-brands fa-youtube text-red-500"></i> Trailer
                        </h3>
                        <div class="video-container shadow-2xl rounded-xl overflow-hidden border border-slate-700">
                            <iframe id="anime-trailer" src="" title="Trailer" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen class="w-full h-full"></iframe>
                        </div>
                    </div>

                    <!-- Characters Section -->
                    <div id="characters-section" class="mb-10">
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-white border-b border-slate-800 pb-2">
                            <i class="fa-solid fa-users text-blue-400"></i> Main Characters & Voice Actors
                        </h3>
                        <div id="characters-loading" class="flex justify-center items-center py-6">
                            <div class="loader w-8 h-8 border-[3px]"></div>
                        </div>
                        <div id="characters-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-4 hidden">
                            <!-- Characters -->
                        </div>
                    </div>

                </div>
            </div>
            
            <!-- Mobile info list -->
            <div class="md:hidden mt-8 mb-4">
                <div class="bg-slate-800/80 p-5 rounded-2xl border border-slate-700 shadow-lg">
                    <h4 class="font-bold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-circle-info text-brand-400"></i> Information</h4>
                    <ul class="text-sm space-y-3 text-gray-300" id="mobile-anime-info-list">
                        <!-- Info gen here too -->
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
